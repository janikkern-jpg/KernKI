[build]
  command = "npx prisma generate && npm run build"
  publish = ".next"

# Netlify installiert @netlify/plugin-nextjs automatisch für Next-Projekte.
# Wir setzen ihn hier explizit, damit auch Serverless-Functions + Streaming
# für die SSE-Chat-API korrekt konfiguriert werden.
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Node-Version, die Netlify verwendet (Prisma & sharp brauchen >=18.17).
[build.environment]
  NODE_VERSION = "20"
  # Prisma-Client MUSS Library-Engine nutzen (kein Data-Proxy),
  # weil wir eine echte postgresql://-URL zu Neon verwenden.
  PRISMA_GENERATE_DATAPROXY = "false"
  PRISMA_CLIENT_ENGINE_TYPE = "library"

# Prisma-Engine-Binary ins Serverless-Function-Bundle mitpacken,
# sonst fällt Prisma auf den Data-Proxy-Modus zurück und erwartet prisma://-URL.
[functions]
  included_files = [
    "node_modules/.prisma/client/**",
    "node_modules/@prisma/client/**",
    "prisma/schema.prisma"
  ]
